name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libnuma-dev \
            pkg-config \
            linux-headers-generic

      - name: Resolve kernel headers
        id: kernel
        shell: bash
        run: |
          set -euo pipefail

          kdir="$(find /usr/src -maxdepth 1 -type d -name 'linux-headers-*' | sort -V | tail -n 1)"

          if [[ -z "$kdir" ]]; then
            echo "Unable to find installed kernel headers" >&2
            exit 1
          fi

          echo "Using kernel headers at: $kdir"
          echo "kdir=$kdir" >> "$GITHUB_OUTPUT"

      - name: Build cxl_ivpci kernel module
        run: make -C driver KDIR='${{ steps.kernel.outputs.kdir }}'

      - name: Build ivshmem kernel module
        run: make -C ivshmem/ivshmem-kernel KDIR='${{ steps.kernel.outputs.kdir }}'

      - name: Build lock benchmarks
        run: |
          cmake -S lupin_lock_benchmark -B build
          cmake --build build -j"$(nproc)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build ivshmem-host
        working-directory: ivshmem/ivshmem-host
        run: cargo build --release

      - name: Build ivshmem-user
        working-directory: ivshmem/ivshmem-user
        run: cargo build --release
